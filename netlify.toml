# Export estático (`pnpm run build` → carpeta `out/`).
# Base directory del repo en la raíz: `section-conferencia-mujeres` (ver netlify.toml padre).

[build]
  command = "pnpm run verify"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
